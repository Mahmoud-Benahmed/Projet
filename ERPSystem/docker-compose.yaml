services:
  service_name-service:
    build:
      context: .
      dockerfile: Dockerfile
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - bin/
            - obj/
    container_name: erp-service_name
    ports:
      - "PORT_TO_EXPOSE:8080"
    env_file:
      - .env
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - erp-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: erp-service_name-sqlserver
    environment:
      SA_PASSWORD: ${SQLSERVER__SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "WSL_PORT:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQLSERVER__SA_PASSWORD}' -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - erp-network

networks:
  erp-network:
    external: true
    name: erp-network


