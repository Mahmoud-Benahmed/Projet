<div class="modal-header">
  @if(data.icon) {
    <mat-icon [ngClass]="'icon--' + (data.iconColor || 'primary')">
      {{ data.icon }}
    </mat-icon>
  }
  <h2 mat-dialog-title>{{ data.title }}</h2>
</div>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  @if(data.showCancel !== false) {
    <!-- FIX: was mat-button with no styling — invisible in dark mode -->
    <button mat-button class="btn-secondary" (click)="cancel()">
      {{ data.cancelText || 'Annuler' }}
    </button>
  }
  <button mat-raised-button color="primary" (click)="confirm()">
    {{ data.confirmText || 'Confirmer' }}
  </button>
</mat-dialog-actions>
