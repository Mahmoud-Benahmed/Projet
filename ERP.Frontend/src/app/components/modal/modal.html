<div class="modal-header">
  @if(data.icon) {
    <mat-icon [ngClass]="'icon--' + (data.iconColor || 'primary')">
      {{ data.icon }}
    </mat-icon>
  }
  <h2 mat-dialog-title>{{ data.title | translate }}</h2>
</div>

<mat-dialog-content>
  <p>{{ data.message | translate }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  @if(data.showCancel !== false) {
    <button mat-button class="btn-secondary" (click)="cancel()">
      {{ data.cancelText ? (data.cancelText | translate) : ('COMMON.CANCEL' | translate) }}
    </button>
  }
  <button mat-raised-button color="primary" (click)="confirm()">
    {{ data.confirmText ? (data.confirmText | translate) : ('COMMON.CONFIRM' | translate) }}
  </button>
</mat-dialog-actions>
