<div class="page">

  <!-- ── PAGE HEADER ── -->
  <div class="page-header">
    <div>
      <p class="breadcrumb">SYSTEM ADMIN</p>
      <h1 class="page-title">Permission Matrix</h1>
    </div>
    <button class="btn-secondary btn-refresh" (click)="loadMatrix()" [disabled]="isLoading">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- ── LOADING ── -->
  <div class="loading-overlay loading-overlay--page" *ngIf="isLoading">
    <div class="spinner"></div>
    <span class="loading-text">Loading permission matrix…</span>
  </div>

  <!-- ── MATRIX ── -->
  <div *ngIf="!isLoading">

    <!-- Role Legend -->
    <div class="table-card legend-card">
      <div class="legend">
        <span class="legend__label">Roles</span>
        <div class="legend__roles">
          <div class="role-badge" *ngFor="let role of roles">
            {{ formatRole(role.libelle) }}
          </div>
        </div>
      </div>
    </div>

    <!-- Category Sections -->
    <div class="table-card category-card" *ngFor="let category of categories">

      <!-- Category Header -->
      <div class="category-header">
        <div class="category-header__name">
          <span class="category-dot"></span>
          {{ category }}
        </div>
        <div class="category-header__roles">
          <div class="category-role-label" *ngFor="let role of roles">
            {{ formatRole(role.libelle) }}
          </div>
        </div>
      </div>

      <!-- Controle Rows -->
      <div class="controle-row"
        *ngFor="let controle of getControlesByCategory(category); let last = last"
        [class.controle-row--last]="last">

        <div class="controle-info">
          <span class="controle-name">{{ controle.libelle }}</span>
          <span class="controle-desc">{{ controle.description }}</span>
        </div>

        <div class="controle-cells">
          <div class="cell-wrapper" *ngFor="let role of roles">
            <ng-container [ngSwitch]="true">

              <!-- Loading -->
              <div class="cell cell--loading"
                *ngSwitchCase="getCell(role.id, controle.id)?.loading === true">
                <div class="spinner spinner--sm"></div>
              </div>

              <!-- Granted -->
              <button class="cell cell--granted"
                *ngSwitchCase="getCell(role.id, controle.id)?.isGranted === true && !getCell(role.id, controle.id)?.loading"
                (click)="togglePrivilege(role.id, controle.id)"
                [title]="'Revoke ' + controle.libelle + ' from ' + formatRole(role.libelle)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </button>

              <!-- Denied -->
              <button class="cell cell--denied"
                *ngSwitchDefault
                (click)="togglePrivilege(role.id, controle.id)"
                [title]="'Grant ' + controle.libelle + ' to ' + formatRole(role.libelle)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>

            </ng-container>
          </div>
        </div>
      </div>

    </div>

    <!-- Stats Footer -->
    <div class="matrix-footer">
      <div class="matrix-stat">
        <span class="matrix-stat__value">{{ roles.length }}</span>
        <span class="matrix-stat__label">Roles</span>
      </div>
      <div class="matrix-stat__divider"></div>
      <div class="matrix-stat">
        <span class="matrix-stat__value">{{ controles.length }}</span>
        <span class="matrix-stat__label">Controls</span>
      </div>
      <div class="matrix-stat__divider"></div>
      <div class="matrix-stat">
        <span class="matrix-stat__value">{{ categories.length }}</span>
        <span class="matrix-stat__label">Services</span>
      </div>
    </div>

  </div>
</div>
