<div class="home">

  <!-- Welcome Banner -->
  <div class="home__banner">
    <div>
      <h1 class="home__welcome">Welcome back, {{ userProfile?.fullName ?? '' }} 👋</h1>
      <div class="home__meta">
        <span class="home__role-badge">{{ userRole }}</span>
        <span class="home__last-login">Last login: {{ lastLogin }}</span>
      </div>
    </div>
  </div>

  <!-- Quick Access -->
  <div class="home__quick-grid">

    <a class="home__quick-card" routerLink="/profile">
      <div class="home__quick-icon home__quick-icon--blue">
        <mat-icon>person</mat-icon>
      </div>
      <span class="home__quick-label">My Profile</span>
      <mat-icon class="home__quick-arrow">arrow_forward</mat-icon>
    </a>

    <a class="home__quick-card" routerLink="/users" *ngIf="userRole === 'SystemAdmin'">
      <div class="home__quick-icon home__quick-icon--green">
        <mat-icon>group</mat-icon>
      </div>
      <span class="home__quick-label">Manage Users</span>
      <mat-icon class="home__quick-arrow">arrow_forward</mat-icon>
    </a>

    <a class="home__quick-card" routerLink="/users/register" *ngIf="userRole === 'SystemAdmin'">
      <div class="home__quick-icon home__quick-icon--blue">
        <mat-icon>person_add</mat-icon>
      </div>
      <span class="home__quick-label">Register User</span>
      <mat-icon class="home__quick-arrow">arrow_forward</mat-icon>
    </a>

  </div>

</div>
